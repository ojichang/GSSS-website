<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSSS / Gaku Shimizu Spatial Studio</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #111111;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      padding: 20px 24px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #111111;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .under-construction {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #111111;
    }
  </style>
</head>
<body>
  <header>GSSS / Gaku Shimizu Spatial Studio</header>
  <main>
    <p class="under-construction">Under Construction···</p>
  </main>
</body>
</html>
